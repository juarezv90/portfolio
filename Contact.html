<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <div class="container">
        <header>
            <h1>Contact Station</h1>
            <nav>

        <div class="messageboard">
            <div class="contactBox">
                <span>Victor Juarez</span>
                <span>Dutchess County, NY</span>
                <span>juarezv1990@gmail.com</span>
            </div>
            <div class="form">
                <form >
                    <input type="text" name="name" id="name" placeholder="Name"/>
                    <input type="email" name="email" id="email" placeholder="Email"/>
                    <textarea name="message" id="message" rows="10" placeholder="Lets plan a project together.."></textarea>

            </div>
        </div>

        </footer>
